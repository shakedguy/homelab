name: it-tools
services:
    it-tools:
        image: corentinth/it-tools:latest
        container_name: it-tools
        restart: unless-stopped
        ports:
            - 5555:80
        
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/health"] 
            interval: 30s
            timeout: 10s
            retries: 5
        