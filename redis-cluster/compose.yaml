
name: redis-cluster

services:
  redis-node-0:
    image: valkey/valkey:8-alpine
    container_name: redis-node-0
    command:
      [
        "redis-server",
        "--cluster-enabled",
        "yes",
        "--appendonly",
        "yes",
        "--bind",
        "0.0.0.0",
        "--port",
        "6000",
        "--protected-mode",
        "no",
        "--cluster-config-file",
        "nodes.conf",
      ]
    expose:
      - 6000
    volumes:
      - ../volumes/redis-cluster/node-0:/data
    network_mode: host
